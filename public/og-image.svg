<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background warm cream -->
  <rect width="1200" height="630" fill="#F2EAD8"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#C4A882" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#C4A882" stroke-width="0.5" opacity="0.3"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#C4A882" stroke-width="0.5" opacity="0.2"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#C4A882" stroke-width="0.5" opacity="0.2"/>

  <!-- Left: Logo + copy -->
  <g transform="translate(90, 220)">
    <!-- Double bookmark -->
    <rect x="0" y="0" width="52" height="72" rx="6" fill="#C4A882"/>
    <polygon points="0,72 26,56 52,72" fill="#A07848"/>
    <rect x="-18" y="0" width="52" height="72" rx="6" fill="#7A5230"/>
    <polygon points="-18,72 8,56 34,72" fill="#5C3A1E"/>

    <!-- Brand name -->
    <text x="70" y="34" font-family="Georgia, serif" font-size="42" font-weight="700" fill="#3D2B1A" letter-spacing="-1">ReadingDeck</text>
    <text x="70" y="62" font-family="Georgia, serif" font-size="18" fill="#7A5230" letter-spacing="0.5" opacity="0.8">나만의 지식 서재</text>

    <!-- Divider -->
    <line x1="0" y1="96" x2="460" y2="96" stroke="#C4A882" stroke-width="1" opacity="0.6"/>

    <!-- Headline -->
    <text x="0" y="140" font-family="Georgia, serif" font-size="30" font-weight="700" fill="#3D2B1A" letter-spacing="-0.5">책은 많이 읽는데,</text>
    <text x="0" y="178" font-family="Georgia, serif" font-size="30" font-weight="700" fill="#3D2B1A" letter-spacing="-0.5">정작 남는 게 없으신가요?</text>

    <!-- Sub -->
    <text x="0" y="216" font-family="Georgia, serif" font-size="16" fill="#7A5230" opacity="0.85">밑줄 친 문장을 연결해 나만의 지식 지도를 만드세요.</text>
  </g>

  <!-- Right: Card stack -->
  <g transform="translate(660, 80)">
    <!-- Card 3 (back) -->
    <rect x="60" y="60" width="420" height="260" rx="16" fill="#EDE0CB" stroke="#C4A882" stroke-width="1.5"/>
    <!-- Card 2 (middle) -->
    <rect x="30" y="30" width="420" height="260" rx="16" fill="#E8D9C0" stroke="#C4A882" stroke-width="1.5"/>
    <!-- Card 1 (front) -->
    <rect x="0" y="0" width="420" height="260" rx="16" fill="#FEFAF4" stroke="#C4A882" stroke-width="1.5"/>

    <!-- Tag pill -->
    <rect x="28" y="28" width="70" height="24" rx="12" fill="#7A5230" opacity="0.15"/>
    <text x="63" y="44" font-family="Georgia, serif" font-size="11" fill="#7A5230" text-anchor="middle" font-weight="600">INSIGHT</text>

    <!-- Book title -->
    <text x="28" y="86" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#3D2B1A">아토믹 해빗</text>
    <text x="28" y="110" font-family="Georgia, serif" font-size="13" fill="#A07848">제임스 클리어</text>

    <!-- Divider -->
    <line x1="28" y1="126" x2="392" y2="126" stroke="#C4A882" stroke-width="0.8" opacity="0.5"/>

    <!-- Quote -->
    <text x="28" y="156" font-family="Georgia, serif" font-size="15" fill="#5C3A1E" opacity="0.9">우리는 목표의 수준까지 높아지는 것이</text>
    <text x="28" y="178" font-family="Georgia, serif" font-size="15" fill="#5C3A1E" opacity="0.9">아니라, 시스템의 수준까지 떨어진다.</text>

    <!-- Node connections -->
    <circle cx="320" cy="216" r="6" fill="#7A5230" opacity="0.4"/>
    <circle cx="360" cy="200" r="6" fill="#7A5230" opacity="0.6"/>
    <circle cx="390" cy="220" r="6" fill="#7A5230" opacity="0.8"/>
    <line x1="320" y1="216" x2="360" y2="200" stroke="#7A5230" stroke-width="1.2" opacity="0.4" stroke-dasharray="3 2"/>
    <line x1="360" y1="200" x2="390" y2="220" stroke="#7A5230" stroke-width="1.2" opacity="0.4" stroke-dasharray="3 2"/>
  </g>
</svg>
